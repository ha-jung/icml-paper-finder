<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ICML 2026 Workshop Finder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="search-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Workshop Finder</p>
          <h1 id="page-title">ICML 2026 Workshops</h1>
          <p class="subtitle">
            Browse workshop titles, organizers, descriptions, rooms, and themes.
          </p>
        </div>

        <form id="search-form" class="search-form">
          <label for="query">Keyword query</label>
          <div class="search-row">
            <input
              id="query"
              name="query"
              type="search"
              autocomplete="off"
              placeholder="e.g. agents, alignment, physics, health"
            />
            <button type="submit">Search</button>
          </div>
        </form>

        <div class="quick-filters" aria-label="Example queries">
          <button type="button" data-query="agentic ai">Agentic AI</button>
          <button type="button" data-query="alignment">Alignment</button>
          <button type="button" data-query="ai for science">AI for Science</button>
          <button type="button" data-query="health">Health</button>
        </div>

        <section class="hot-keywords" aria-label="Hot keywords">
          <div class="hot-keywords-title">Hot Keywords</div>
          <div id="hot-keywords-list" class="hot-keywords-list"></div>
        </section>

        <section class="filters" aria-label="Filters">
          <label for="room-filter">Room</label>
          <select id="room-filter"></select>

          <label for="sort-select">Sort results</label>
          <select id="sort-select">
            <option value="relevance">Relevance</option>
            <option value="title">Title</option>
            <option value="room">Room</option>
          </select>
        </section>

        <div class="action-grid">
          <button id="show-all-button" type="button">Show All Workshops</button>
          <button id="saved-button" type="button">Saved Workshops</button>
        </div>
      </section>

      <section class="answer-panel" aria-live="polite">
        <div id="status" class="status">Loading workshops...</div>
        <div id="answer" class="answer"></div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
